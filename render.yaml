services:
  - type: web
    name: previewpanel-backend
    runtime: node
    rootDir: backend
    buildCommand: apt-get install -y ffmpeg && npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TWELVELABS_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
