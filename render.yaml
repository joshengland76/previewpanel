# IMPORTANT (found Phase C, Prompt 2, 2026-07-10): this file is NOT actually
# synced to the live Render service (`previewpanel`, srv-d7n73lhj2pic738mfthg).
# That service was created directly via the Render dashboard/API, not as a
# "Blueprint" from this file, so Render never reads buildCommand/startCommand/
# envVars from here -- it has its own independently-configured values, changed
# only via the Render API (`PATCH /v1/services/{id}` for buildCommand/
# startCommand, `PUT /v1/services/{id}/env-vars/{key}` for env vars). This file
# is kept as the DOCUMENTED INTENT / historical record of what the build
# should do, but if you change it, you must ALSO push the equivalent change to
# the real service via the API (or dashboard) -- editing this file alone does
# nothing. Confirmed by GET /v1/services/{id}: the actual buildCommand is
# `yarn` (not npm), actual startCommand is `yarn start` -- both now updated
# below to match what's real (previously said `npm install`, which was never
# true either).
services:
  - type: web
    name: previewpanel-backend
    runtime: node
    rootDir: backend
    # Phase C, Prompt 2 -- REVISED after a real build failure: Render's Node
    # build container has a READ-ONLY /var/lib/apt (confirmed live: "apt-get
    # update" -> "E: List directory /var/lib/apt/lists/partial is missing. -
    # Acquire (30: Read-only file system)"). apt-get cannot run at all in
    # this environment -- ffmpeg only ever worked because it ships in
    # Render's base Node image, not because of anything in this file (which,
    # separately, was never even wired to the real service -- see the note
    # above). Fixed by downloading chromaprint's own prebuilt static
    # linux-x86_64 fpcalc binary (no shared-lib deps, no package manager
    # needed) directly into validation/, where fingerprint.py prefers it over
    # a system "fpcalc" when present. python3 itself IS present in Render's
    # Node image (needed by node-gyp for native module builds), so a venv +
    # pip install still works without apt. Semicolons (not &&) between the
    # fingerprinting-setup steps and the final `yarn install` mean a
    # transient failure fetching/building any of this can NEVER block the
    # core app deploy -- fingerprinting degrades gracefully (same as its
    # runtime behavior), the site always still ships.
    buildCommand: curl -sL https://github.com/acoustid/chromaprint/releases/download/v1.5.1/chromaprint-fpcalc-1.5.1-linux-x86_64.tar.gz | tar xz -C ../validation --strip-components=1 chromaprint-fpcalc-1.5.1-linux-x86_64/fpcalc ; chmod +x ../validation/fpcalc ; python3 -m venv ../validation/_venv ; ../validation/_venv/bin/pip install --no-cache-dir -r ../validation/requirements.txt ; yarn
    startCommand: yarn start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TWELVELABS_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEARCH_API_KEY
        sync: false
      - key: PYTHON_BIN
        value: /opt/render/project/src/validation/_venv/bin/python3
      - key: FINGERPRINT_PREVIEWS
        value: "true"
