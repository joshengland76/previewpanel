<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PreviewPanel</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#795548" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PreviewPanel" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script type="module" crossorigin src="/assets/index-CI4_Wdou.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").then(reg => {
            // If a new worker is already waiting, activate it immediately
            if (reg.waiting) {
              reg.waiting.postMessage("SKIP_WAITING");
              navigator.serviceWorker.addEventListener("controllerchange", () => window.location.reload());
            }
            // Watch for a new worker installing after page load
            reg.addEventListener("updatefound", () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener("statechange", () => {
                if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                  // New version ready — activate immediately without waiting for tab close
                  newWorker.postMessage("SKIP_WAITING");
                  navigator.serviceWorker.addEventListener("controllerchange", () => window.location.reload());
                }
              });
            });
          });
        });
      }
    </script>
  </body>
</html>
